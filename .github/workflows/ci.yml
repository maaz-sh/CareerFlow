name: CareerFlow CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  backend:
    name: Backend - Test and Build
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: careerflow_test
          POSTGRES_USER: careerflow_user
          POSTGRES_PASSWORD: careerflow_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U careerflow_user -d careerflow_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/careerflow_test
      SPRING_DATASOURCE_USERNAME: careerflow_user
      SPRING_DATASOURCE_PASSWORD: careerflow_password
      JWT_SECRET: test-secret-test-secret-test-secret-test-secret

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
          cache: maven
          cache-dependency-path: pom.xml

      - name: Run tests
        run: mvn test

      - name: Build jar
        run: mvn package -DskipTests

  frontend:
    name: Frontend - Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build
