spring:
  application:
    name: careerflow

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/careerflow}
    username: ${DB_USERNAME:careerflow_user}
    password: ${DB_PASSWORD:careerflow_password}

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

server:
  port: ${PORT:8080}

jwt:
  secret: ${JWT_SECRET}
  expiration-minutes: ${JWT_EXPIRATION_MINUTES:60}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,https://*.app.github.dev}

springdoc:
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    org.springframework.security: ${LOG_LEVEL_SECURITY:INFO}